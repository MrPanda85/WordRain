<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Rain – Hantera glosor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      padding: 24px 16px;
    }
    h1 {
      color: #FFD93D;
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 28px;
    }
    .back-link {
      display: block;
      text-align: center;
      color: #4ECDC4;
      text-decoration: none;
      margin-bottom: 20px;
      font-size: 15px;
    }
    .back-link:hover { text-decoration: underline; }

    /* Add form */
    .add-form {
      background: #16213e;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .add-form h2 { color: #4ECDC4; font-size: 16px; margin-bottom: 4px; }
    .input-row { display: flex; gap: 10px; }
    input {
      flex: 1;
      background: #0f3460;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    input:focus { border-color: #4ECDC4; }
    input::placeholder { color: #555; }
    .add-btn {
      background: #6BCB77;
      color: #fff;
      font-weight: 900;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .add-btn:hover { opacity: .85; }
    .error { color: #FF6B6B; font-size: 14px; min-height: 18px; }

    /* Word list */
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .list-header h2 { color: #FFD93D; font-size: 18px; }
    .count { color: #666; font-size: 14px; }

    .word-list { display: flex; flex-direction: column; gap: 8px; }
    .word-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #16213e;
      border-radius: 10px;
      padding: 12px 16px;
    }
    .word-en { color: #4ECDC4; font-weight: bold; font-size: 16px; }
    .word-arrow { color: #555; margin: 0 10px; }
    .word-sv { color: #FFD93D; font-size: 16px; }
    .del-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background .15s;
    }
    .del-btn:hover { background: rgba(255,107,107,.2); }
    .empty { color: #555; text-align: center; padding: 24px; font-size: 15px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #6BCB77;
      color: #fff;
      font-weight: bold;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 15px;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <a class="back-link" href="/">← Tillbaka till spelet</a>
  <h1>⚙️ Hantera glosor</h1>
  <p class="subtitle">Ändringar sparas direkt i appen</p>

  <div class="add-form">
    <h2>Lägg till ny glosa</h2>
    <div class="input-row">
      <input id="enInput" placeholder="Engelska (t.ex. apple)" autocomplete="off" />
      <input id="svInput" placeholder="Svenska (t.ex. äpple)" autocomplete="off" />
    </div>
    <div class="error" id="error"></div>
    <button class="add-btn" onclick="addWord()">+ Lägg till</button>
  </div>

  <div class="list-header">
    <h2>Alla glosor</h2>
    <span class="count" id="count"></span>
  </div>
  <div class="word-list" id="wordList"></div>

  <div class="toast" id="toast"></div>

  <script>
    const BLOB_URL = 'https://jsonblob.com/api/jsonBlob/019cddde-47dc-78f8-b72d-dcca077f55ba';
    let words = [];

    async function fetchWords() {
      try {
        const res = await fetch(BLOB_URL, { cache: 'no-store' });
        words = await res.json();
      } catch { words = []; }
      render();
    }

    async function pushWords() {
      await fetch(BLOB_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(words),
      });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function render() {
      document.getElementById('count').textContent = words.length + ' st';
      const list = document.getElementById('wordList');
      if (words.length === 0) {
        list.innerHTML = '<p class="empty">Inga glosor ännu — lägg till ovan!</p>';
        return;
      }
      list.innerHTML = words.map((w, i) => `
        <div class="word-row">
          <span>
            <span class="word-en">${esc(w.en)}</span>
            <span class="word-arrow">→</span>
            <span class="word-sv">${esc(w.sv)}</span>
          </span>
          <button class="del-btn" onclick="deleteWord(${i})" title="Ta bort">🗑️</button>
        </div>
      `).join('');
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function addWord() {
      const en = document.getElementById('enInput').value.trim().toLowerCase();
      const sv = document.getElementById('svInput').value.trim().toLowerCase();
      const err = document.getElementById('error');
      if (!en || !sv) { err.textContent = 'Fyll i båda fälten.'; return; }
      if (words.some(w => w.en === en)) { err.textContent = 'Det engelska ordet finns redan.'; return; }
      err.textContent = '';
      words.push({ en, sv });
      await pushWords();
      document.getElementById('enInput').value = '';
      document.getElementById('svInput').value = '';
      document.getElementById('enInput').focus();
      render();
      showToast('✅ ' + en + ' → ' + sv + ' tillagd!');
    }

    async function deleteWord(index) {
      const removed = words.splice(index, 1)[0];
      await pushWords();
      render();
      showToast('🗑️ ' + removed.en + ' borttagen');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') addWord(); });

    fetchWords();
  </script>
</body>
</html>
