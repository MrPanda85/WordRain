<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Rain – Hantera glosor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* ── Login ── */
    #loginScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      gap: 16px;
    }
    .login-box {
      background: #16213e;
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .login-title { color: #FFD93D; font-size: 26px; font-weight: 900; text-align: center; margin-bottom: 8px; }
    .login-input {
      background: #0f3460;
      border: 1px solid #2a2a4e;
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff;
      font-size: 17px;
      outline: none;
      width: 100%;
    }
    .login-input:focus { border-color: #4ECDC4; }
    .login-btn {
      background: #FF6B6B;
      color: #fff;
      font-weight: 900;
      font-size: 17px;
      border: none;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      margin-top: 4px;
    }
    .login-btn:hover { opacity: .9; }
    .login-error { color: #FF6B6B; font-size: 14px; text-align: center; min-height: 18px; }

    /* ── Admin ── */
    #adminScreen { display: none; }
    h1 { color: #FFD93D; font-size: 28px; font-weight: 900; text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 28px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .back-link { color: #4ECDC4; text-decoration: none; font-size: 15px; }
    .back-link:hover { text-decoration: underline; }
    .logout-btn { background: none; border: 1px solid #444; border-radius: 8px; color: #888; font-size: 13px; padding: 6px 12px; cursor: pointer; }
    .logout-btn:hover { border-color: #FF6B6B; color: #FF6B6B; }

    .add-form {
      background: #16213e; border-radius: 14px; padding: 18px;
      margin-bottom: 24px; display: flex; flex-direction: column; gap: 10px;
    }
    .add-form h2 { color: #4ECDC4; font-size: 16px; margin-bottom: 4px; }
    .input-row { display: flex; gap: 10px; }
    input {
      flex: 1; background: #0f3460; border: 1px solid #2a2a4e;
      border-radius: 10px; padding: 12px 14px; color: #fff; font-size: 16px; outline: none;
    }
    input:focus { border-color: #4ECDC4; }
    input::placeholder { color: #555; }
    .add-btn {
      background: #6BCB77; color: #fff; font-weight: 900; font-size: 16px;
      border: none; border-radius: 12px; padding: 14px; cursor: pointer;
    }
    .add-btn:hover { opacity: .85; }
    .error { color: #FF6B6B; font-size: 14px; min-height: 18px; }

    .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .list-header h2 { color: #FFD93D; font-size: 18px; }
    .count { color: #666; font-size: 14px; }
    .word-list { display: flex; flex-direction: column; gap: 8px; }
    .word-row {
      display: flex; align-items: center; justify-content: space-between;
      background: #16213e; border-radius: 10px; padding: 12px 16px;
    }
    .word-en { color: #4ECDC4; font-weight: bold; font-size: 16px; }
    .word-arrow { color: #555; margin: 0 10px; }
    .word-sv { color: #FFD93D; font-size: 16px; }
    .del-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
    .del-btn:hover { background: rgba(255,107,107,.2); }
    .empty { color: #555; text-align: center; padding: 24px; font-size: 15px; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #6BCB77; color: #fff; font-weight: bold;
      padding: 12px 24px; border-radius: 50px; font-size: 15px;
      opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- Login screen -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="login-title">🔐 Word Rain Admin</div>
      <input id="usernameInput" class="login-input" type="text" placeholder="Användarnamn" autocomplete="username" />
      <input id="passwordInput" class="login-input" type="password" placeholder="Lösenord" autocomplete="current-password" />
      <div class="login-error" id="loginError"></div>
      <button class="login-btn" onclick="doLogin()">Logga in</button>
    </div>
  </div>

  <!-- Admin screen -->
  <div id="adminScreen">
    <div class="top-bar">
      <a class="back-link" href="/">← Tillbaka till spelet</a>
      <button class="logout-btn" onclick="doLogout()">Logga ut</button>
    </div>
    <h1>⚙️ Hantera glosor</h1>
    <p class="subtitle">Ändringar sparas direkt i appen</p>

    <div class="add-form">
      <h2>Lägg till ny glosa</h2>
      <div class="input-row">
        <input id="enInput" placeholder="Engelska (t.ex. apple)" autocomplete="off" />
        <input id="svInput" placeholder="Svenska (t.ex. äpple)" autocomplete="off" />
      </div>
      <div class="error" id="error"></div>
      <button class="add-btn" onclick="addWord()">+ Lägg till</button>
    </div>

    <div class="list-header">
      <h2>Alla glosor</h2>
      <span class="count" id="count"></span>
    </div>
    <div class="word-list" id="wordList"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const GIST_ID = '233d2800db917eb9e5e65f8f546e0bf5';
    const RAW_URL = 'https://gist.githubusercontent.com/MrPanda85/' + GIST_ID + '/raw/glosor.json';
    const API_URL = 'https://api.github.com/gists/' + GIST_ID;
    const ADMIN_TOKEN = '__ADMIN_TOKEN__';
    const AUTH_KEY = 'wordrain_auth';

    let words = [];

    // ── Auth ──────────────────────────────────────────────────────────────────
    function isLoggedIn() {
      return localStorage.getItem(AUTH_KEY) === 'yes';
    }

    function doLogin() {
      const u = document.getElementById('usernameInput').value.trim();
      const p = document.getElementById('passwordInput').value.trim();
      if (u === 'Pappa' && p === 'Lilly') {
        localStorage.setItem(AUTH_KEY, 'yes');
        showAdmin();
      } else {
        document.getElementById('loginError').textContent = 'Fel användarnamn eller lösenord.';
      }
    }

    function doLogout() {
      localStorage.removeItem(AUTH_KEY);
      document.getElementById('adminScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
    }

    function showAdmin() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      fetchWords();
    }

    // Enter key on login
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (!isLoggedIn()) doLogin();
        else addWord();
      }
    });

    // ── Words ─────────────────────────────────────────────────────────────────
    async function fetchWords() {
      try {
        const res = await fetch(RAW_URL + '?t=' + Date.now(), { cache: 'no-store' });
        words = await res.json();
      } catch { words = []; }
      render();
    }

    async function pushWords() {
      await fetch(API_URL, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + ADMIN_TOKEN,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ files: { 'glosor.json': { content: JSON.stringify(words) } } }),
      });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function render() {
      document.getElementById('count').textContent = words.length + ' st';
      const list = document.getElementById('wordList');
      if (words.length === 0) {
        list.innerHTML = '<p class="empty">Inga glosor ännu — lägg till ovan!</p>';
        return;
      }
      list.innerHTML = words.map((w, i) => `
        <div class="word-row">
          <span>
            <span class="word-en">${esc(w.en)}</span>
            <span class="word-arrow">→</span>
            <span class="word-sv">${esc(w.sv)}</span>
          </span>
          <button class="del-btn" onclick="deleteWord(${i})" title="Ta bort">🗑️</button>
        </div>
      `).join('');
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function addWord() {
      const en = document.getElementById('enInput').value.trim().toLowerCase();
      const sv = document.getElementById('svInput').value.trim().toLowerCase();
      const err = document.getElementById('error');
      if (!en || !sv) { err.textContent = 'Fyll i båda fälten.'; return; }
      if (words.some(w => w.en === en)) { err.textContent = 'Det engelska ordet finns redan.'; return; }
      err.textContent = '';
      words.push({ en, sv });
      await pushWords();
      document.getElementById('enInput').value = '';
      document.getElementById('svInput').value = '';
      document.getElementById('enInput').focus();
      render();
      showToast('✅ ' + en + ' → ' + sv + ' tillagd!');
    }

    async function deleteWord(index) {
      const removed = words.splice(index, 1)[0];
      await pushWords();
      render();
      showToast('🗑️ ' + removed.en + ' borttagen');
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    if (isLoggedIn()) {
      showAdmin();
    }
  </script>
</body>
</html>
